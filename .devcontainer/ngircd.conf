[Global]
    Name = agent-chat.local
    AdminInfo1 = pi agent chat
    Info = Pi Agent IRC Chat
    Listen = 127.0.0.1
    Ports = 6667
    PidFile = /var/run/ngircd/ngircd.pid

[Limits]
    MaxNickLength = 30

[Options]
    DNS = no
    Ident = no
    PAM = no
    RequireAuthPing = no

[Channel]
    Name = #general
    Topic = Agent coordination channel
    Modes = tn
